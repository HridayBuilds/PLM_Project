# ==================== EMAIL CONFIGURATION ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App Email Settings
app.email.from=noreply@plm-system.com
app.frontend.url=http://localhost:3000

# ==================== CORS CONFIGURATION ====================
cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.exposed-headers=Authorization
cors.allow-credentials=true
cors.max-age=3600

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.com.odoo.plm=DEBUG
logging.level.org.springframework.security=DEBUG

# ==================== OPENAPI/SWAGGER ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==================== AMAZON S3 CONFIGURATION ====================
aws.s3.bucket-name=plm-system-bucket
aws.s3.region=ap-south-1
aws.s3.access-key=your_aws_access_key
aws.s3.secret-key=your_aws_secret_key

# ==================== FILE STORAGE CONFIGURATION ====================
# Storage type: 'local' or 's3' (switch between implementations)
app.storage.type=local
app.storage.local.upload-dir=./uploads
app.storage.allowed-types=pdf,png,jpg,jpeg,doc,docx,xls,xlsx,csv
app.storage.max-file-size=10485760